<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ali AI Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0f1a;
--card:#151c2e;
--text:#e9eef7;
--muted:#93a4b8;
--green:#19d38a;
--blue:#2b6fff;
--orange:#ff7a00;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:radial-gradient(circle at top,#101933,#0b0f1a);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:18px;
}

.container{
width:min(460px,100%);
background:rgba(21,28,46,0.95);
border-radius:22px;
padding:24px;
box-shadow:0 0 50px rgba(0,0,0,0.7);
}

.logo{text-align:center;font-size:24px;font-weight:800;color:var(--green)}
.subtitle{text-align:center;font-size:13px;color:var(--muted);margin-bottom:12px}

.badges{
display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;
}

.badge{
font-size:12px;padding:6px 10px;border-radius:999px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.07);
}

.section-title{margin:12px 0 6px;font-weight:700;font-size:14px}

.games{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.game{
background:var(--card);
padding:10px;border-radius:12px;
display:flex;gap:6px;align-items:center;
}

.input{
width:100%;padding:12px;border-radius:12px;border:none;
background:var(--card);color:#fff;
}

.warn{display:none;color:var(--orange);font-size:12px;margin-top:6px}

.btn{
width:100%;margin-top:14px;padding:14px;border:none;
border-radius:12px;font-weight:800;
background:linear-gradient(90deg,var(--orange),var(--green));
color:#000;cursor:pointer;
}

.btn:disabled{opacity:.5}

.progress{display:none;height:10px;background:var(--card);border-radius:999px;margin-top:12px}
.bar{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--blue));animation:fill 2s forwards}
@keyframes fill{to{width:100%}}

.live{margin-top:10px;font-size:12px;text-align:center;color:var(--muted)}
#online{color:var(--green)}

.meta{
display:flex;justify-content:space-between;
font-size:12px;margin-top:10px;color:var(--muted);
}

/* popup */
.popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:var(--card);
padding:20px;
border-radius:16px;
width:90%;
max-width:320px;
text-align:center;
}

.popup-title{
color:var(--orange);
font-weight:700;
margin-bottom:10px;
}

.popup-btn{
margin-top:12px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:var(--green);
color:black;
font-weight:700;
cursor:pointer;
}

.footer{
text-align:center;
margin-top:10px;
font-size:11px;
color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<div class="logo">Ali AI Predictor</div>
<div class="subtitle">تحليل ذكي • نسخة العراق</div>

<div class="badges">
<div class="badge">🔒 آمن</div>
<div class="badge">⚡ AI</div>
<div class="badge">🇮🇶 العراق</div>
</div>

<div class="section-title">اختر اللعبة</div>
<div class="games">
<label class="game"><input type="radio" checked> ✈️ Aviator</label>
<label class="game"><input type="radio"> 💣 Mines</label>
<label class="game"><input type="radio"> 🍎 Apple of Fortune</label>
<label class="game"><input type="radio"> ⚽ Penalty</label>
<label class="game"><input type="radio"> 🐔 Chicken Road</label>
</div>

<div class="section-title">رقم الحساب</div>
<input id="acc" class="input" maxlength="10" placeholder="اكتب 10 أرقام فقط">
<div id="warn" class="warn">يرجى إدخال 10 أرقام فقط</div>

<button id="btn" class="btn" disabled>بدء تحليل AI</button>

<div class="progress" id="prog"><div class="bar"></div></div>

<div class="live">
📡 الآن <span id="online">140</span> مستخدم نشط
</div>

<div class="meta">
<div>⏳ <span id="time">05:00</span></div>
<div>🟢 مباشر</div>
</div>

<div class="footer">
نظام تحليل فقط
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<div class="popup-title">❌ لم يتم العثور على إيداع</div>
<div>
لم يتم العثور على إيداع 10000 دينار عراقي (IQD).<br>
يرجى إجراء الإيداع للمتابعة.
</div>
<button class="popup-btn" onclick="retry()">حاول مرة أخرى</button>
</div>
</div>

<script>

let t=300;
setInterval(()=>{
t--;
let m=String(Math.floor(t/60)).padStart(2,"0");
let s=String(t%60).padStart(2,"0");
document.getElementById("time").textContent=m+":"+s;
},1000);

setInterval(()=>{
document.getElementById("online").textContent =
135 + Math.floor(Math.random()*10-4);
},2000);

const acc=document.getElementById("acc");
const btn=document.getElementById("btn");
const prog=document.getElementById("prog");
const warn=document.getElementById("warn");

acc.addEventListener("input",()=>{
acc.value = acc.value.replace(/\D/g,'');
const valid = acc.value.length === 10;
btn.disabled = !valid;
warn.style.display = valid ? "none" : "block";
});

btn.addEventListener("click",()=>{
prog.style.display="block";
setTimeout(()=>{
document.getElementById("popup").style.display="flex";
},2000);
});

function retry(){
document.getElementById("popup").style.display="none";
prog.style.display="none";
}

</script>

</body>
</html>
