<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ali AI Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0f1a;
--card:#151c2e;
--text:#e9eef7;
--muted:#93a4b8;
--green:#19d38a;
--blue:#2b6fff;
--orange:#ff7a00;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Cairo',sans-serif;
background:radial-gradient(circle at top,#101933,#0b0f1a);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:18px;
}

.container{
width:min(460px,100%);
background:rgba(21,28,46,0.95);
border-radius:22px;
padding:24px;
box-shadow:0 0 50px rgba(0,0,0,0.7);
border:1px solid rgba(255,255,255,0.05);
}

.logo{
text-align:center;
font-size:24px;
font-weight:800;
color:var(--green);
margin-bottom:6px;
}

.subtitle{
text-align:center;
font-size:13px;
color:var(--muted);
margin-bottom:12px;
}

.badges{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
margin-bottom:14px;
}

.badge{
font-size:12px;
padding:6px 10px;
border-radius:999px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.07);
color:var(--muted);
}

.notice{
background:rgba(25,211,138,0.08);
border:1px solid rgba(25,211,138,0.25);
padding:10px;
border-radius:12px;
font-size:12px;
text-align:center;
margin-bottom:12px;
color:var(--green);
}

.section-title{
margin:12px 0 6px;
font-weight:700;
font-size:14px;
}

.games{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.game{
background:var(--card);
border:1px solid rgba(255,255,255,0.06);
padding:10px;
border-radius:12px;
display:flex;
align-items:center;
gap:6px;
font-size:13px;
cursor:pointer;
}

.input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:var(--card);
color:#fff;
}

.btn{
width:100%;
margin-top:14px;
padding:14px;
border-radius:12px;
border:none;
font-weight:800;
font-size:15px;
background:linear-gradient(90deg,var(--orange),var(--green));
color:#000;
cursor:pointer;
}

.btn:disabled{opacity:.5}

.progress{
display:none;
height:10px;
background:var(--card);
border-radius:999px;
margin-top:12px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--green),var(--blue));
animation:fill 2s forwards;
}

@keyframes fill{to{width:100%}}

.live{
margin-top:12px;
font-size:12px;
color:var(--muted);
text-align:center;
}

#online{color:var(--green)}

.meta{
display:flex;
justify-content:space-between;
font-size:12px;
margin-top:12px;
color:var(--muted);
}

.telegram{
margin-top:14px;
display:block;
text-align:center;
padding:12px;
border-radius:12px;
background:#229ED9;
color:white;
font-weight:700;
text-decoration:none;
}

.footer{
text-align:center;
margin-top:10px;
font-size:11px;
color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<div class="logo">Ali AI Predictor</div>

<div class="subtitle">
تحليل ذكي للبيانات • نسخة العراق
</div>

<div class="badges">
<div class="badge">🔒 آمن</div>
<div class="badge">📊 تحليل</div>
<div class="badge">⚡ مباشر</div>
<div class="badge">🇮🇶 العراق</div>
</div>

<div class="notice">
⚡ يتم تحديث البيانات كل 10 ثواني — النتائج تعتمد على التحليل فقط
</div>

<div class="section-title">اختر اللعبة</div>

<div class="games">
<label class="game"><input type="radio" name="g" checked> Aviator</label>
<label class="game"><input type="radio" name="g"> Mines</label>
<label class="game"><input type="radio" name="g"> Crash</label>
<label class="game"><input type="radio" name="g"> Penalty</label>
<label class="game"><input type="radio" name="g"> 🐔 Chicken Road</label>
<label class="game"><input type="radio" name="g"> 🎰 Slots</label>
</div>

<div class="section-title">رقم الحساب</div>
<input id="acc" class="input" placeholder="اكتب رقم الحساب">

<button id="btn" class="btn" disabled>
بدء تحليل AI
</button>

<div class="progress" id="prog"><div class="bar"></div></div>

<div class="live">
📡 الآن <span id="online">138</span> شخص يستخدم الأداة
</div>

<div class="meta">
<div>⏳ <span id="time">05:00</span></div>
<div>🟢 Online</div>
</div>

<a class="telegram" href="https://t.me/" target="_blank">
الدخول إلى القناة
</a>

<div class="footer">
لأغراض تحليلية فقط • ليست أداة ضمان أرباح
</div>

</div>

<script>

let t=300;
setInterval(()=>{
t--;
let m=String(Math.floor(t/60)).padStart(2,"0");
let s=String(t%60).padStart(2,"0");
document.getElementById("time").textContent=m+":"+s;
},1000);

setInterval(()=>{
document.getElementById("online").textContent =
135 + Math.floor(Math.random()*10-4);
},2000);

const acc=document.getElementById("acc");
const btn=document.getElementById("btn");
const prog=document.getElementById("prog");

acc.addEventListener("input",()=>{
btn.disabled = acc.value.length < 5;
});

btn.addEventListener("click",()=>{
prog.style.display="block";

setTimeout(()=>{
window.location.href="https://t.me/";
},2000);

});

</script>

</body>
</html>
