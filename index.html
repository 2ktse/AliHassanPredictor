<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ali AI Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --green:#0cb86a;
  --blue:#1b57f2;
  --orange:#ff7a00;
  --bg:#0d1117;
  --card:#1a2336;
  --muted:#9aa4b2;
  --text:#e9edf3;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{
  background:var(--card);
  width:min(440px,100%);
  border-radius:20px;
  padding:26px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.flag{width:64px;display:block;margin:0 auto 10px}

h1{
  text-align:center;
  color:var(--green);
  font-size:26px;
  font-weight:800;
}

.subtitle{
  text-align:center;
  font-size:13px;
  color:var(--muted);
  margin-bottom:16px;
}

.badges{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.badge{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--muted);
}

label{display:block;margin:12px 0 6px;font-weight:600}

.games{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.game{
  padding:10px;
  background:#1a2336;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
}

.input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#1a2336;
  color:#fff;
}

.btn{
  width:100%;
  margin-top:16px;
  padding:14px;
  border-radius:12px;
  border:none;
  font-weight:700;
  font-size:16px;
  background:linear-gradient(90deg,var(--orange),var(--green));
  color:black;
  cursor:pointer;
}

.btn:disabled{opacity:.6}

.progress{
  display:none;
  height:10px;
  background:#1a2336;
  border-radius:999px;
  margin-top:14px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--green),var(--blue));
  animation:fill 2.4s forwards;
}

@keyframes fill{
  to{width:100%}
}

.meta{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-top:14px;
  color:var(--muted);
}

#online{color:var(--green)}

.footer{
  text-align:center;
  margin-top:14px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<img class="flag" src="https://flagcdn.com/w320/iq.png">

<h1>Ali AI Predictor</h1>
<div class="subtitle">تحليل إحصائي للألعاب • نسخة العراق</div>

<div class="badges">
<div class="badge">🔒 آمن</div>
<div class="badge">📊 تحليل بيانات</div>
<div class="badge">🇮🇶 العراق</div>
</div>

<label>اختر اللعبة</label>
<div class="games">
<label class="game"><input type="radio" name="g" checked> Aviator</label>
<label class="game"><input type="radio" name="g"> Mines</label>
<label class="game"><input type="radio" name="g"> Penalty</label>
<label class="game"><input type="radio" name="g"> Crash</label>
</div>

<label>رقم الحساب</label>
<input class="input" id="acc" placeholder="أدخل رقم الحساب">

<button class="btn" id="btn" disabled>بدء التحليل</button>

<div class="progress" id="prog"><div class="bar"></div></div>

<div class="meta">
<div>🟢 مستخدمون: <span id="online">120</span></div>
<div>⏳ <span id="time">05:00</span></div>
</div>

<div class="footer">Ali Tech • Dashboard System</div>

</div>

<script>
let t=300;
setInterval(()=>{
t--;
let m=String(Math.floor(t/60)).padStart(2,"0");
let s=String(t%60).padStart(2,"0");
document.getElementById("time").textContent=m+":"+s;
},1000);

setInterval(()=>{
document.getElementById("online").textContent=120+Math.floor(Math.random()*10-4);
},2500);

const acc=document.getElementById("acc");
const btn=document.getElementById("btn");
const prog=document.getElementById("prog");

acc.addEventListener("input",()=>{
btn.disabled=acc.value.length<5;
});

btn.addEventListener("click",()=>{
prog.style.display="block";
setTimeout(()=>{
alert("تم تحليل البيانات بنجاح (نسخة تجريبية)");
},2400);
});
</script>

</body>
</html>
